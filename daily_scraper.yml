name: Daily Poll News Scraper

on:
  schedule:
    # UTC 時間 23:00 等於台灣時間 (UTC+8) 早上 7:00
    - cron: '0 23 * * *'
  workflow_dispatch: # 允許手動點擊執行

# 設定全域環境變數，強制啟用 Node.js 24 確保相容性
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest

    steps:
    - name: 取得程式碼 (Checkout repository)
      uses: actions/checkout@v4  # 確保使用較新版本

    - name: 設定 Python 環境
      uses: actions/setup-python@v5 # 升級至支援 Node.js 24 的 v5 版本

    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行爬蟲與寄信
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: python main.py
